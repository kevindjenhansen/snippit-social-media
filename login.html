<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Snippit</title>
    <link href="styles/css/login.css" rel="stylesheet" />
  </head>
  <body>
    <form id="loginForm" class="p-3">
      <div class="mb-3">
        <label for="email" class="form-label"
          >Email (must be @stud.noroff.no)</label
        >
        <input
          type="email"
          class="form-control"
          id="email"
          name="email"
          required
          aria-describedby="emailHelp"
        />
        <div id="emailHelp" class="form-text">
          We'll never share your email with anyone else.
        </div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          required
          minlength="8"
        />
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>

      <div class="text-center mt-3">
        <p class="mb-2">Don't have an account?</p>
        <button
          type="button"
          id="registerBtn"
          class="btn btn-outline-primary w-100 fw-bold"
        >
          Register
        </button>
      </div>

      <div id="message" class="mt-3 small text-center"></div>
    </form>

    <script src="javascript/auth/login.js"></script>
  </body>
</html>
