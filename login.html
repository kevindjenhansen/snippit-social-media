<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Log in to Snippit to create, edit, delete, and search posts."
  >

  <title>Login - Snippit</title>

  <link rel="stylesheet" href="./styles/css/variables.css">
  <link rel="stylesheet" href="./styles/css/index.css">
  <link rel="icon" type="image/png" href="./assets/snippit-logo.png">
</head>

<body>
  <main class="auth-layout">
    <section class="auth-card" aria-labelledby="login-heading">
      <a href="./index.html" class="auth-logo" aria-label="Go to Snippit homepage">
        <img src="./assets/snippit-logo.png" alt="Snippit Logo">
      </a>

      <div class="auth-header">
        <p class="feed-label">Welcome back</p>
        <h1 id="login-heading">Log in</h1>
        <p>
          Log in to create posts, manage your snippits, and continue browsing the feed.
        </p>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>

          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="yourname@stud.noroff.no"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>

          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            autocomplete="current-password"
            placeholder="Enter your password"
          >
        </div>

        <button type="submit" class="button-blue auth-submit">
          Login
        </button>

        <div class="auth-switch">
          <p>Don't have an account?</p>

          <button
            type="button"
            id="registerBtn"
            class="button-blue button-secondary"
          >
            Register
          </button>
        </div>

        <div id="message" class="auth-message" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="./javascript/auth/login.js"></script>
</body>
</html>
