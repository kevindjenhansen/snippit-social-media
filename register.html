<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="Register for Snippit to create, edit, delete, and search posts."
  >

  <title>Register - Snippit</title>

  <link rel="stylesheet" href="./styles/css/variables.css">
  <link rel="stylesheet" href="./styles/css/index.css">
  <link rel="icon" type="image/png" href="./assets/snippit-logo.png">
</head>

<body>
  <main class="auth-layout">
    <section class="auth-card" aria-labelledby="register-heading">
      <a href="./index.html" class="auth-logo" aria-label="Go to Snippit homepage">
        <img src="./assets/snippit-logo.png" alt="Snippit Logo">
      </a>

      <div class="auth-header">
        <p class="feed-label">Create account</p>
        <h1 id="register-heading">Register</h1>
        <p>
          Create a Snippit account with your Noroff student email to start posting.
        </p>
      </div>

      <form id="registerForm" class="auth-form">
        <div class="form-group">
          <label for="name">Name</label>

          <input
            type="text"
            id="name"
            name="name"
            required
            minlength="5"
            autocomplete="name"
            placeholder="Your display name"
          >
        </div>

        <div class="form-group">
          <label for="email">Email</label>

          <input
            type="email"
            id="email"
            name="email"
            required
            autocomplete="email"
            placeholder="yourname@stud.noroff.no"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>

          <input
            type="password"
            id="password"
            name="password"
            required
            minlength="8"
            autocomplete="new-password"
            placeholder="Minimum 8 characters"
          >
        </div>

        <button type="submit" class="button-blue auth-submit">
          Register
        </button>

        <div class="auth-switch">
          <p>Already have an account?</p>

          <a href="./login.html" class="button-blue button-secondary">
            Login
          </a>
        </div>

        <div id="message" class="auth-message" aria-live="polite"></div>
      </form>
    </section>
  </main>

  <script src="./javascript/auth/register.js"></script>
</body>
</html>
