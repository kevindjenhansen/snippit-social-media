<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta
    name="description"
    content="View and manage your own Snippit posts."
  >

  <title>My Profile - Snippit</title>

  <link rel="stylesheet" href="./styles/css/variables.css">
  <link rel="stylesheet" href="./styles/css/index.css">
  <link rel="icon" type="image/png" href="./assets/snippit-logo.png">
</head>

<body>
  <div class="container">
    <aside class="sidebar" aria-label="Main navigation">
      <div class="logo">
        <a href="./index.html" aria-label="Go to Snippit homepage">
          <img src="./assets/snippit-logo.png" alt="Snippit Logo">
        </a>
      </div>

      <div class="welcome" id="welcome-message"></div>

      <nav class="nav">
        <ul>
          <li><a href="./index.html">Home</a></li>
          <li><a href="#">Messages</a></li>
          <li><a href="#">Following</a></li>
          <li><a href="./profile.html" aria-current="page">Profile</a></li>
          <li><a href="#">More</a></li>
          <li id="auth-buttons"></li>
        </ul>
      </nav>
    </aside>

    <main class="post-feed">
      <section class="feed-top" aria-labelledby="profile-heading">
        <div>
          <p class="feed-label">Profile</p>

          <h1 id="profile-heading">My Snippits</h1>

          <p class="feed-description">
            Manage the posts you have created, edit older snippits, or publish something new.
          </p>
        </div>

        <button id="new-post-btn" class="button-blue" type="button">
          + New Post
        </button>
      </section>

      <form id="new-post-form" class="hidden">
        <input
          type="text"
          id="post-title"
          placeholder="Post title"
          required
          aria-label="Post title"
        >

        <textarea
          id="post-body"
          placeholder="What's on your mind?"
          rows="4"
          aria-label="Post body"
        ></textarea>

        <button type="submit" class="button-blue">
          Publish
        </button>
      </form>

      <div id="posts"></div>
    </main>
  </div>

  <script src="./javascript/profile/sidebar.js"></script>
  <script type="module" src="./javascript/profile/profile.js"></script>
</body>
</html>
